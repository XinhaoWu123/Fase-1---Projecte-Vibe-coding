
<style>
  #gameContainer { position: relative; width: 100%; max-width: 800px; margin: 0 auto; font-family: var(--font-mono); }
  #gameCanvas { display: block; width: 100%; border-radius: 8px; border: 2px solid var(--color-border-primary); cursor: pointer; }
  #ui { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); margin-bottom: 8px; font-size: 13px; color: var(--color-text-primary); }
  #controls { display: flex; gap: 8px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
  .ctrl-btn { padding: 8px 16px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 13px; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .ctrl-btn:active { transform: scale(0.97); background: var(--color-background-secondary); }
  #overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.75); border-radius: 8px; color: #fff; text-align: center; }
  #overlay h2 { font-size: 28px; margin: 0 0 8px; font-weight: 500; }
  #overlay p { font-size: 14px; margin: 0 0 16px; opacity: 0.8; }
  #overlay button { padding: 10px 28px; background: #e8a020; border: none; border-radius: 6px; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
</style>

<div id="gameContainer">
  <div id="ui">
    <span>❤️ <span id="lives">3</span></span>
    <span>⭐ <span id="score">0</span></span>
    <span>⏱ <span id="timer">60</span>s</span>
  </div>
  <div style="position:relative">
    <canvas id="gameCanvas" width="800" height="380"></canvas>
    <div id="overlay">
      <h2>🍄 Plataformes</h2>
      <p>Arriba a la bandera! Salta sobre els enemics per eliminar-los.<br>A/D o ←/→ per moure's · W/↑/Espai per saltar</p>
      <button onclick="startGame()">Jugar!</button>
    </div>
  </div>
  <div id="controls">
    <button class="ctrl-btn" id="btnLeft" onpointerdown="keys.left=true" onpointerup="keys.left=false">◀</button>
    <button class="ctrl-btn" id="btnJump" onpointerdown="keys.jump=true;keys.jumpPressed=true" onpointerup="keys.jump=false">▲ Salt</button>
    <button class="ctrl-btn" id="btnRight" onpointerdown="keys.right=true" onpointerup="keys.right=false">▶</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let gameState = 'menu', raf, timerInterval;
const keys = { left: false, right: false, jump: false, jumpPressed: false };

window.addEventListener('keydown', e => {
  if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = true;
  if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true;
  if ((e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') && !keys.jump) { keys.jump = true; keys.jumpPressed = true; }
  e.code === 'Space' && e.preventDefault();
});
window.addEventListener('keyup', e => {
  if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = false;
  if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false;
  if (e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') keys.jump = false;
});

const GRAVITY = 0.5, JUMP = -11, SPEED = 3.5;
const LEVEL_W = 3200;

let player, enemies, platforms, coins, goal, camera, score, lives, timeLeft, particles;

const platformData = [
  {x:0,y:330,w:400,h:50,c:'#4a8c3f'},
  {x:450,y:330,w:300,h:50,c:'#4a8c3f'},
  {x:400,y:260,w:80,h:20,c:'#b87333'},
  {x:550,y:220,w:100,h:20,c:'#b87333'},
  {x:800,y:330,w:500,h:50,c:'#4a8c3f'},
  {x:700,y:240,w:80,h:20,c:'#b87333'},
  {x:820,y:180,w:80,h:20,c:'#b87333'},
  {x:960,y:240,w:80,h:20,c:'#b87333'},
  {x:1100,y:220,w:120,h:20,c:'#b87333'},
  {x:1350,y:330,w:500,h:50,c:'#4a8c3f'},
  {x:1280,y:240,w:60,h:20,c:'#b87333'},
  {x:1420,y:180,w:80,h:20,c:'#b87333'},
  {x:1560,y:240,w:80,h:20,c:'#b87333'},
  {x:1700,y:300,w:80,h:20,c:'#b87333'},
  {x:1900,y:330,w:600,h:50,c:'#4a8c3f'},
  {x:1860,y:240,w:80,h:20,c:'#b87333'},
  {x:2020,y:180,w:80,h:20,c:'#b87333'},
  {x:2200,y:330,w:700,h:50,c:'#4a8c3f'},
  {x:2180,y:240,w:80,h:20,c:'#b87333'},
  {x:2350,y:200,w:80,h:20,c:'#b87333'},
  {x:2500,y:260,w:80,h:20,c:'#b87333'},
  {x:2600,y:180,w:80,h:20,c:'#b87333'},
  {x:2950,y:330,w:300,h:50,c:'#4a8c3f'},
];

const enemyData = [
  {x:500,y:305},{x:870,y:305},{x:1000,y:305},{x:1400,y:305},{x:1600,y:305},
  {x:1950,y:305},{x:2100,y:305},{x:2250,y:305},{x:2700,y:305},
  {x:730,y:215},{x:830,y:155},{x:1150,y:195},{x:1440,y:155},{x:2060,y:155}
];

const coinData = [
  {x:420,y:230},{x:570,y:190},{x:720,y:210},{x:840,y:150},{x:990,y:210},
  {x:1130,y:190},{x:1300,y:210},{x:1440,y:150},{x:1580,y:210},{x:1720,y:270},
  {x:1880,y:210},{x:2040,y:150},{x:2200,y:210},{x:2370,y:170},{x:2520,y:230},
  {x:2620,y:150},{x:2980,y:300},{x:3000,y:300},{x:3020,y:300}
];

function initGame() {
  player = { x: 80, y: 260, w: 28, h: 36, vx: 0, vy: 0, onGround: false, dir: 1, jumpHeld: false };
  camera = { x: 0 };
  score = 0; lives = 3; timeLeft = 90;
  document.getElementById('score').textContent = 0;
  document.getElementById('lives').textContent = 3;
  document.getElementById('timer').textContent = 90;
  particles = [];

  platforms = platformData.map(p => ({...p}));
  enemies = enemyData.map(e => ({x:e.x, y:e.y, w:30, h:28, vx:1.2, alive:true, onGround:false}));
  coins = coinData.map(c => ({x:c.x, y:c.y, r:8, collected:false, anim:Math.random()*Math.PI*2}));
  goal = { x: LEVEL_W - 80, y: 140, w: 30, h: 190 };
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  initGame();
  gameState = 'playing';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (gameState !== 'playing') return;
    timeLeft--;
    document.getElementById('timer').textContent = timeLeft;
    if (timeLeft <= 0) endGame(false);
  }, 1000);
  cancelAnimationFrame(raf);
  loop();
}

function endGame(won) {
  gameState = won ? 'won' : 'lost';
  clearInterval(timerInterval);
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = won
    ? `<h2>🏆 Has Guanyat!</h2><p>Puntuació: ${score}</p><button onclick="startGame()">Tornar a jugar</button>`
    : `<h2>💀 Game Over</h2><p>Puntuació: ${score}</p><button onclick="startGame()">Tornar a jugar</button>`;
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({ x, y, vx: (Math.random()-0.5)*4, vy: -Math.random()*4-1, life: 1, color });
  }
}

function aabb(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function updatePlayer() {
  if (keys.left) { player.vx -= 0.8; player.dir = -1; }
  else if (keys.right) { player.vx += 0.8; player.dir = 1; }
  else { player.vx *= 0.7; }
  player.vx = Math.max(-SPEED, Math.min(SPEED, player.vx));

  if (keys.jumpPressed && player.onGround) {
    player.vy = JUMP;
    player.onGround = false;
    player.jumpHeld = true;
  }
  keys.jumpPressed = false;
  if (!keys.jump) player.jumpHeld = false;
  if (player.jumpHeld && player.vy < -4) player.vy -= 0.3;

  player.vy += GRAVITY;
  player.vy = Math.min(player.vy, 15);
  player.x += player.vx;
  player.y += player.vy;
  player.onGround = false;

  for (let p of platforms) {
    if (player.x+player.w > p.x && player.x < p.x+p.w) {
      if (player.vy >= 0 && player.y+player.h > p.y && player.y+player.h < p.y+p.h+player.vy+2) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0 && player.y < p.y+p.h && player.y > p.y) {
        player.y = p.y+p.h;
        player.vy = 0;
      }
    }
    if (player.y+player.h > p.y && player.y < p.y+p.h) {
      if (player.vx > 0 && player.x+player.w > p.x && player.x < p.x) { player.x = p.x-player.w; player.vx=0; }
      if (player.vx < 0 && player.x < p.x+p.w && player.x+player.w > p.x+p.w) { player.x = p.x+p.w; player.vx=0; }
    }
  }

  if (player.x < 0) player.x = 0;
  if (player.x + player.w > LEVEL_W) player.x = LEVEL_W - player.w;
  if (player.y > H + 100) { loseLife(); }
}

function loseLife() {
  lives--;
  document.getElementById('lives').textContent = lives;
  spawnParticles(player.x + player.w/2, player.y + player.h/2, '#e24b4a', 12);
  if (lives <= 0) endGame(false);
  else { player.x = 80; player.y = 260; player.vx = 0; player.vy = 0; camera.x = 0; }
}

function updateEnemies() {
  for (let e of enemies) {
    if (!e.alive) continue;
    e.vy = (e.vy || 0) + GRAVITY;
    e.x += e.vx;
    e.y += e.vy;
    e.onGround = false;
    for (let p of platforms) {
      if (e.x+e.w > p.x && e.x < p.x+p.w) {
        if (e.vy >= 0 && e.y+e.h > p.y && e.y+e.h < p.y+p.h+16) {
          e.y = p.y - e.h; e.vy = 0; e.onGround = true;
        }
      }
    }
    if (e.x < 0 || e.x + e.w > LEVEL_W) e.vx *= -1;
    let blocked = false;
    for (let p of platforms) {
      if (e.onGround && (e.vx > 0 && Math.abs(e.x+e.w - p.x) < 4 || e.vx < 0 && Math.abs(e.x - (p.x+p.w)) < 4)) {
        if (e.y+e.h >= p.y && e.y < p.y+p.h) { blocked = true; break; }
      }
    }
    if (blocked) e.vx *= -1;
    if (e.onGround) {
      let onEdge = true;
      for (let p of platforms) {
        let checkX = e.vx > 0 ? e.x+e.w+2 : e.x-2;
        if (checkX > p.x && checkX < p.x+p.w && e.y+e.h >= p.y && e.y+e.h <= p.y+p.h+4) { onEdge = false; break; }
      }
    }
    if (aabb(player, e)) {
      let pBottom = player.y + player.h, eTop = e.y, pVy = player.vy;
      if (pBottom - eTop < 18 && pVy > 0) {
        e.alive = false;
        player.vy = -7;
        score += 100;
        document.getElementById('score').textContent = score;
        spawnParticles(e.x+e.w/2, e.y+e.h/2, '#facc15', 10);
      } else {
        loseLife();
      }
    }
  }
}

function updateCoins() {
  for (let c of coins) {
    if (c.collected) continue;
    c.anim += 0.06;
    let pr = { x: player.x, y: player.y, w: player.w, h: player.h };
    let cr = { x: c.x - c.r, y: c.y - c.r, w: c.r*2, h: c.r*2 };
    if (aabb(pr, cr)) {
      c.collected = true;
      score += 10;
      document.getElementById('score').textContent = score;
      spawnParticles(c.x, c.y, '#facc15', 6);
    }
  }
}

function checkGoal() {
  if (aabb(player, goal)) endGame(true);
}

function updateCamera() {
  let target = player.x - W * 0.35;
  camera.x += (target - camera.x) * 0.12;
  camera.x = Math.max(0, Math.min(LEVEL_W - W, camera.x));
}

function updateParticles() {
  for (let p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.04;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#87ceeb');
  sky.addColorStop(1, '#c8e6f5');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  let clouds = [{x:100,y:50,s:1},{x:350,y:30,s:0.8},{x:600,y:60,s:1.1},{x:750,y:25,s:0.9}];
  for (let cl of clouds) {
    let cx = ((cl.x - camera.x * 0.3) % (W+200) + W+200) % (W+200) - 100;
    ctx.save(); ctx.translate(cx, cl.y); ctx.scale(cl.s, cl.s);
    ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2); ctx.arc(30,0,22,0,Math.PI*2);
    ctx.arc(-25,0,20,0,Math.PI*2); ctx.arc(10,-18,18,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawPlatforms() {
  for (let p of platforms) {
    let sx = p.x - camera.x;
    if (sx > W || sx + p.w < 0) continue;
    ctx.fillStyle = p.c;
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.fillStyle = p.c === '#4a8c3f' ? '#5cb85c' : '#d4956a';
    ctx.fillRect(sx, p.y, p.w, 6);
    if (p.c === '#4a8c3f') {
      ctx.fillStyle = '#3a6b30';
      for (let i = 0; i < p.w; i += 24) ctx.fillRect(sx+i, p.y+8, 20, 4);
    }
  }
}

function drawPlayer() {
  let sx = player.x - camera.x;
  ctx.save();
  if (player.dir < 0) { ctx.translate(sx + player.w/2, 0); ctx.scale(-1,1); ctx.translate(-player.w/2, 0); sx = 0; }
  // Cos
  ctx.fillStyle = '#e8a020';
  ctx.fillRect(sx+2, player.y+14, player.w-4, player.h-14);
  // Cap
  ctx.fillStyle = '#cc3300';
  ctx.beginPath(); ctx.ellipse(sx+player.w/2, player.y+10, 15, 13, 0, 0, Math.PI*2); ctx.fill();
  // Cara
  ctx.fillStyle = '#f5c49a';
  ctx.fillRect(sx+4, player.y+10, player.w-8, 14);
  // Ulls
  ctx.fillStyle = '#fff';
  ctx.fillRect(sx+14, player.y+12, 8, 6);
  ctx.fillStyle = '#111';
  ctx.fillRect(sx+16, player.y+13, 4, 4);
  // Bigoti
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(sx+5, player.y+19, 14, 3);
  // Gorra visera
  ctx.fillStyle = '#cc3300';
  ctx.fillRect(sx+1, player.y+9, player.w-2, 5);
  ctx.fillRect(sx+player.w-4, player.y+10, 6, 4);
  // Cames
  ctx.fillStyle = '#3355aa';
  let legOff = Math.sin(Date.now()/80) * (Math.abs(player.vx) > 0.3 ? 4 : 0);
  ctx.fillRect(sx+2, player.y+player.h-12, 10, 12+legOff);
  ctx.fillRect(sx+player.w-12, player.y+player.h-12, 10, 12-legOff);
  ctx.fillStyle = '#222';
  ctx.fillRect(sx+1, player.y+player.h-2, 12, 4);
  ctx.fillRect(sx+player.w-13, player.y+player.h-2, 12, 4);
  ctx.restore();
}

function drawEnemies() {
  for (let e of enemies) {
    if (!e.alive) continue;
    let sx = e.x - camera.x;
    if (sx > W || sx+e.w < 0) continue;
    let face = e.vx < 0 ? -1 : 1;
    ctx.save();
    if (face < 0) { ctx.translate(sx+e.w/2, 0); ctx.scale(-1,1); ctx.translate(-e.w/2, 0); sx = 0; }
    ctx.fillStyle = '#8B4513';
    ctx.beginPath(); ctx.ellipse(sx+e.w/2, e.y+e.h*0.55, e.w/2-1, e.h*0.45, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#a0522d';
    ctx.beginPath(); ctx.ellipse(sx+e.w/2, e.y+e.h*0.35, e.w/2-1, e.h*0.38, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx+4, e.y+8, 7, 6);
    ctx.fillRect(sx+e.w-11, e.y+8, 7, 6);
    ctx.fillStyle = '#111';
    ctx.fillRect(sx+5, e.y+9, 4, 4);
    ctx.fillRect(sx+e.w-10, e.y+9, 4, 4);
    ctx.fillStyle = '#cc3300';
    ctx.fillRect(sx+8, e.y+e.h-10, 14, 10);
    ctx.restore();
  }
}

function drawCoins() {
  for (let c of coins) {
    if (c.collected) continue;
    let sx = c.x - camera.x;
    if (sx < -20 || sx > W+20) continue;
    let bobY = c.y + Math.sin(c.anim) * 3;
    ctx.fillStyle = '#facc15';
    ctx.beginPath(); ctx.arc(sx, bobY, c.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e6b800';
    ctx.beginPath(); ctx.arc(sx, bobY, c.r-2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff7c0';
    ctx.fillRect(sx-1, bobY-c.r+2, 3, 4);
  }
}

function drawGoal() {
  let sx = goal.x - camera.x;
  if (sx < -60 || sx > W+60) return;
  ctx.fillStyle = '#888';
  ctx.fillRect(sx, goal.y, 6, goal.h);
  ctx.fillStyle = '#e8a020';
  ctx.beginPath();
  ctx.moveTo(sx+6, goal.y);
  ctx.lineTo(sx+6+50, goal.y+20);
  ctx.lineTo(sx+6, goal.y+40);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#cc3300';
  ctx.fillRect(sx+6, goal.y, 50, 8);
  ctx.fillRect(sx+6, goal.y+16, 50, 8);
  ctx.fillRect(sx+6, goal.y+32, 50, 8);
}

function drawParticles() {
  for (let p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x - camera.x, p.y, 4, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function loop() {
  if (gameState !== 'playing') return;
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  updateCamera();
  updateParticles();
  drawPlatforms();
  drawGoal();
  drawCoins();
  drawEnemies();
  updatePlayer();
  updateEnemies();
  updateCoins();
  checkGoal();
  drawPlayer();
  drawParticles();
  raf = requestAnimationFrame(loop);
}
</script>
